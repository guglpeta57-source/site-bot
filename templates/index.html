<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учебный бот</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Учебный бот</h1>

        <div class="content-wrapper">
            <!-- Колонка с настройками -->
            <div class="role-column">
                <h3>Настройки</h3>

                <!-- Выбор предмета -->
                <div class="select-group">
                    <label for="subject">Предмет:</label>
                    <select id="subject" onchange="updateBotRole()">
                        <option value="математика">Математика</option>
                        <option value="русский язык">Русский язык</option>
                        <option value="физика">Физика</option>
                        <option value="химия">Химия</option>
                        <option value="биология">Биология</option>
                        <option value="история">История</option>
                        <option value="информатика">Информатика</option>
                        <option value="английский язык">Английский язык</option>
                    </select>
                </div>

                <!-- Выбор класса -->
                <div class="select-group">
                    <label for="grade">Класс:</label>
                    <select id="grade" onchange="updateBotRole()">
                        <option value="5">5 класс</option>
                        <option value="6">6 класс</option>
                        <option value="7">7 класс</option>
                        <option value="8">8 класс</option>
                        <option value="9">9 класс</option>
                        <option value="10">10 класс</option>
                        <option value="11">11 класс</option>
                    </select>
                </div>

                <!-- Скрытое поле для роли -->
                <textarea id="bot-role" style="display: none;">Ты — строгий, но добрый учитель, который помогает ученику разобраться в теме.

**Правила общения:**
1. **Сначала задай вопрос** по теме и попытайся добиться правильного ответа от ученика.
2. Если ученик отвечает неправильно — **уточни вопрос** или задай наводящий вопрос.
3. Если ученик не знает ответ — **дай подсказку** (но не ответ!).
4. Если ученик говорит "не знаю", "сдаюсь" или просит помочь — **объясни тему с нуля** и дай правильный ответ.
5. **Всегда проверяй понимание** ученика после объяснения.

**Примеры:**
- Если ученик не знает формулу — спроси: "Какую формулу мы используем для решения этой задачи?"
- Если ученик ошибся — скажи: "Почти правильно! Попробуй ещё раз."
- Если ученик сдался — объясни: "Давай разберём по шагам: 1) ..., 2) ..."

Сейчас ты ведёшь урок по предмету "математика" для 5 класса.</textarea>
            </div>

            <!-- Колонка с чатом -->
            <div class="chat-column">
                <div id="chat" class="chat"></div>
                <div class="input-area">
                    <input
                        type="text"
                        id="message"
                        placeholder="Введите сообщение..."
                        onkeypress="handleKeyPress(event)"
                    >
                    <button onclick="sendMessage()">Отправить</button>
                    <!-- Кнопка очистки чата -->
                    <button onclick="clearChat()" style="background: #ff6b6b;">Очистить чат</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подсказка о командах -->
    <div class="commands-hint">
        <p>💡 <strong>Подсказка:</strong> Попробуйте команды: <code>/help</code>, <code>/clear</code>, <code>/subject физика</code>, <code>/example квадратные уравнения</code></p>
    </div>

    <script>
        // Обновляем роль бота при изменении предмета/класса
        function updateBotRole() {
            const subject = document.getElementById("subject").value;
            const grade = document.getElementById("grade").value;
            const roleTextarea = document.getElementById("bot-role");

            const lines = roleTextarea.value.split('\n');
            if (lines.length >= 10) { // Обновляем строку с предметом и классом
                lines[9] = `Сейчас ты ведёшь урок по предмету "${subject}" для ${grade} класса.`;
                roleTextarea.value = lines.join('\n');
            }
        }

        // Обработка нажатия Enter
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        // Функция для отправки сообщения
        async function sendMessage() {
            const messageInput = document.getElementById("message");
            const message = messageInput.value.trim();
            if (!message) return;

            const botRole = document.getElementById("bot-role").value.trim();

            const chat = document.getElementById("chat");
            chat.innerHTML += `<div><b>Вы:</b> ${message}</div>`;
            messageInput.value = "";

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        message: message,
                        role: botRole
                    })
                });

                const data = await response.json();
                if (data.error) {
                    chat.innerHTML += `<div><b>Ошибка:</b> ${data.error}</div>`;
                } else {
                    chat.innerHTML += `<div><b>Учитель:</b> ${data.answer}</div>`;
                }
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                chat.innerHTML += `<div><b>Ошибка:</b> ${error.message}</div>`;
            }
        }

        // Функция для очистки чата (визуально)
        function clearChat() {
            const chat = document.getElementById("chat");
            chat.innerHTML = "";
        }

        // Функция для очистки истории (на сервере)
        async function clearHistory() {
            try {
                const response = await fetch("/clear_history", {
                    method: "POST"
                });
                const chat = document.getElementById("chat");
                chat.innerHTML = "<div>История очищена!</div>";
            } catch (error) {
                alert("Ошибка при очистке истории: " + error.message);
            }
        }
    </script>
</body>
</html>
