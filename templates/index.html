<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n.shim bot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>n.shim bot</h1>

        <div class="content-wrapper">
            <!-- Колонка с ролью бота (слева) -->
            <div class="role-column">
                <h3>Роль бота</h3>
                <textarea id="bot-role" placeholder="Ты — эксперт по Python. Отвечай подробно, с примерами кода и объяснениями."></textarea>
            </div>

            <!-- Колонка с чатом (справа) -->
            <div class="chat-column">
                <div id="chat" class="chat"></div>
                <div class="input-area">
                    <input type="text" id="message" placeholder="Введите сообщение...">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const messageInput = document.getElementById("message");
            const message = messageInput.value.trim();
            if (!message) return;

            const botRole = document.getElementById("bot-role").value.trim() || "Ты — эксперт по Python. Отвечай подробно, с примерами кода и объяснениями.";

            const chat = document.getElementById("chat");
            chat.innerHTML += `<div><b>Вы:</b> ${message}</div>`;
            messageInput.value = "";

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        message: message,
                        role: botRole
                    })
                });

                const data = await response.json();
                chat.innerHTML += `<div><b>Бот:</b> ${data.answer}</div>`;
                chat.scrollTop = chat.scrollHeight; // Прокрутка вниз
            } catch (error) {
                chat.innerHTML += `<div><b>Ошибка:</b> ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
