<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учебный бот</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Учебный бот</h1>

        <div class="content-wrapper">
            <!-- Колонка с настройками -->
            <div class="role-column">
                <h3>Настройки</h3>

                <!-- Выбор предмета -->
                <div class="select-group">
                    <label for="subject">Предмет:</label>
                    <select id="subject" onchange="updateBotRole()">
                        <option value="математика">Математика</option>
                        <option value="русский язык">Русский язык</option>
                        <option value="физика">Физика</option>
                        <option value="химия">Химия</option>
                        <option value="биология">Биология</option>
                        <option value="история">История</option>
                        <option value="информатика">Информатика</option>
                        <option value="английский язык">Английский язык</option>
                    </select>
                </div>

                <!-- Выбор класса -->
                <div class="select-group">
                    <label for="grade">Класс:</label>
                    <select id="grade" onchange="updateBotRole()">
                        <option value="5">5 класс</option>
                        <option value="6">6 класс</option>
                        <option value="7">7 класс</option>
                        <option value="8">8 класс</option>
                        <option value="9">9 класс</option>
                        <option value="10">10 класс</option>
                        <option value="11">11 класс</option>
                    </select>
                </div>

                <!-- Скрытое поле для роли -->
                <textarea id="bot-role" style="display: none;">Ты — опытный учитель, который помогает ученику разобраться в конкретной теме.

**Правила общения:**
1. Сначала спроси ученика, какую тему он хочет изучить или повторить.
   Пример: *"Давай начнём! Какую тему ты хочешь разобрать сегодня?"*

2. Когда тема названа, задавай уточняющие вопросы, чтобы понять уровень ученика.
   Пример: *"Ты уже знаком с основными понятиями по этой теме или начинаем с нуля?"*

3. Добивайся правильных ответов от ученика, задавая наводящие вопросы.
   Пример: *"Как ты думаешь, с чего нужно начать решение этой задачи?"*

4. Если ученик не знает, давай подсказки, но не ответ сразу.
   Пример: *"Подсказка: вспомни формулу для нахождения площади прямоугольника."*

5. Если ученик сдаётся, объясни тему с нуля и проверь понимание.
   Пример: *"Хорошо, давай разберём по шагам: 1) ..., 2) ... Понятно?"*

6. Всегда проверяй, что ученик понял материал, прежде чем переходить дальше.

Сейчас ты ведёшь урок по предмету "математика" для 5 класса.</textarea>
            </div>

            <!-- Колонка с чатом -->
            <div class="chat-column">
                <div id="chat" class="chat"></div>
                <div class="input-area">
                    <input
                        type="text"
                        id="message"
                        placeholder="Введите сообщение..."
                        onkeypress="handleKeyPress(event)"
                    >
                    <button onclick="sendMessage()">Отправить</button>
                    <button onclick="clearChat()" style="background: #ff6b6b;">Очистить чат</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подсказка о командах -->
    <div class="commands-hint">
        <p>💡 <strong>Подсказка:</strong> Попробуйте команды: <code>/help</code>, <code>/clear</code>, <code>/subject физика</code>, <code>/example квадратные уравнения</code></p>
    </div>

    <script>
        // Обновляем роль бота при изменении предмета/класса
        function updateBotRole() {
            const subject = document.getElementById("subject").value;
            const grade = document.getElementById("grade").value;
            const roleTextarea = document.getElementById("bot-role");

            // Ищем строку с предметом и классом и обновляем её
            const lines = roleTextarea.value.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes("Сейчас ты ведёшь урок по предмету")) {
                    lines[i] = `Сейчас ты ведёшь урок по предмету "${subject}" для ${grade} класса.`;
                    break;
                }
            }
            roleTextarea.value = lines.join('\n');
        }

        // Обработка нажатия Enter
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        // Функция для отправки сообщения
        async function sendMessage() {
            const messageInput = document.getElementById("message");
            const message = messageInput.value.trim();
            if (!message) return;

            const botRole = document.getElementById("bot-role").value.trim();

            const chat = document.getElementById("chat");
            chat.innerHTML += `<div><b>Вы:</b> ${message}</div>`;
            messageInput.value = "";

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        message: message,
                        role: botRole
                    })
                });

                const data = await response.json();
                if (data.error) {
                    chat.innerHTML += `<div><b>Ошибка:</b> ${data.error}</div>`;
                } else {
                    chat.innerHTML += `<div><b>Учитель:</b> ${data.answer}</div>`;
                }
                chat.scrollTop = chat.scrollHeight;
            } catch (error) {
                chat.innerHTML += `<div><b>Ошибка:</b> ${error.message}</div>`;
            }
        }

        // Функция для очистки чата
        function clearChat() {
            const chat = document.getElementById("chat");
            chat.innerHTML = "";
        }
    </script>
</body>
</html>
